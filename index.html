<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>
    <div class="settings-panel">
        <div class="settings-body">
            <fieldset id="settings-fieldset" class="settings-fields">
                <div class="settings-row">
                    <label class="settings-field">
                        <span class="settings-label">Work</span>
                        <div class="settings-input-group">
                            <input id="work-duration" type="number" class="settings-input" min="1" max="120" value="25">
                            <span class="settings-unit">min</span>
                        </div>
                    </label>
                    <label class="settings-field">
                        <span class="settings-label">Break</span>
                        <div class="settings-input-group">
                            <input id="break-duration" type="number" class="settings-input" min="1" max="60" value="5">
                            <span class="settings-unit">min</span>
                        </div>
                    </label>
                </div>
                <span class="settings-label">Shortcuts</span>
                <div class="settings-row shortcuts-row">
                    <span class="settings-label">Work</span>
                    <div class="shortcut-group">
                        <button type="button" class="btn-shortcut" data-target="work" data-minutes="15">15m</button>
                        <button type="button" class="btn-shortcut" data-target="work" data-minutes="25">25m</button>
                        <button type="button" class="btn-shortcut" data-target="work" data-minutes="45">45m</button>
                        <button type="button" class="btn-shortcut" data-target="work" data-minutes="60">60m</button>
                    </div>
                </div>
                <div class="settings-row shortcuts-row">
                    <span class="settings-label">Break</span>
                    <div class="shortcut-group">
                        <button type="button" class="btn-shortcut" data-target="break" data-minutes="2">2m</button>
                        <button type="button" class="btn-shortcut" data-target="break" data-minutes="5">5m</button>
                        <button type="button" class="btn-shortcut" data-target="break" data-minutes="15">15m</button>
                    </div>
                </div>
                <div class="settings-row">
                    <label class="settings-field settings-field-hue">
                        <span class="settings-label">Theme color</span>
                        <input id="theme-hue" type="range" min="0" max="360" value="239" class="settings-hue-slider">
                    </label>
                </div>
            </fieldset>
            <button id="settings-toggle-btn" class="settings-toggle" aria-label="Toggle settings">
                <svg class="settings-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="app">
        <div class="timer-card">
            <div class="mode-toggle">
                <button id="mode-work-btn" type="button" class="mode-toggle-btn active">Work</button>
                <button id="mode-break-btn" type="button" class="mode-toggle-btn">Break</button>
            </div>
            <p id="time-display" class="timer-display">25:00</p>
            <div class="timer-controls">
                <button id="start-pause-btn" class="btn btn-primary">Start</button>
                <button id="reset-btn" class="btn btn-secondary">Reset</button>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
